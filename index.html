<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スワンプマン</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg:        #0d1117;
    --surface:   #131c24;
    --surface2:  #1a2633;
    --border:    #1f3040;
    --accent:    #2a7f7f;
    --accent2:   #3db8b8;
    --text:      #c8d8e0;
    --text-dim:  #6a8899;
    --text-muted:#3a5060;
    --error:     #c05050;
    --success:   #3db88a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    line-height: 1.8;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(42,127,127,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 60% at 80% 80%, rgba(42,127,127,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header { margin-bottom: 48px; text-align: center; }

  .logo-mark { display: inline-block; width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.85; }

  h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(28px, 6vw, 38px);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #e0ecf0;
    margin-bottom: 10px;
  }

  .tagline { font-size: 12px; letter-spacing: 0.18em; color: var(--text-dim); text-transform: uppercase; }

  .section { margin-bottom: 32px; }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .url-grid { display: flex; flex-direction: column; gap: 10px; }
  .url-row { display: flex; align-items: center; gap: 10px; }
  .url-index { font-size: 11px; color: var(--text-muted); width: 18px; text-align: right; flex-shrink: 0; }
  .url-input-wrap { flex: 1; }

  input[type="url"], input[type="text"], textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    font-size: 13px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.5;
  }
  input[type="url"]:focus, input[type="text"]:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(42,127,127,0.15);
  }
  input::placeholder, textarea::placeholder { color: var(--text-muted); }
  textarea { resize: vertical; min-height: 72px; }

  /* 文字数ボタン */
  .wordcount-grid { display: flex; gap: 8px; flex-wrap: wrap; }

  .wc-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 9px 18px;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.05em;
  }
  .wc-btn:hover { border-color: var(--accent); color: var(--text); }
  .wc-btn.selected { background: rgba(42,127,127,0.18); border-color: var(--accent2); color: var(--accent2); }

  /* メインボタン */
  .btn-main {
    background: var(--accent);
    color: #e0ecf0;
    border: none;
    border-radius: 6px;
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 14px 36px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    width: 100%;
    margin-top: 12px;
  }
  .btn-main:hover:not(:disabled) { background: #338f8f; }
  .btn-main:active:not(:disabled) { transform: scale(0.99); }
  .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }

  /* フロー */
  .flow { margin-top: 40px; display: flex; flex-direction: column; gap: 0; }

  .flow-step { position: relative; padding: 24px 0 0; }

  .flow-step:not(:last-child)::after {
    content: '';
    position: absolute;
    left: 15px; top: 54px; bottom: -20px;
    width: 1px;
    background: var(--border);
  }

  .flow-step-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }

  .flow-num {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .flow-step.active .flow-num { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 0 3px rgba(61,184,184,0.12); }
  .flow-step.done .flow-num { border-color: var(--success); color: var(--success); background: rgba(61,184,138,0.1); }

  .flow-step-title { font-size: 13px; color: var(--text-dim); letter-spacing: 0.05em; }
  .flow-step.active .flow-step-title,
  .flow-step.done .flow-step-title { color: var(--text); }

  .flow-content { margin-left: 44px; padding-bottom: 24px; }

  /* プロンプトボックス */
  .prompt-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

  .prompt-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .prompt-badge { font-size: 10px; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; }

  .btn-copy-prompt {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 11px;
    padding: 4px 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-copy-prompt:hover { border-color: var(--accent); color: var(--accent2); }

  .prompt-text {
    padding: 16px;
    font-size: 12.5px;
    line-height: 1.85;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 280px;
    overflow-y: auto;
  }
  .prompt-text::-webkit-scrollbar { width: 4px; }
  .prompt-text::-webkit-scrollbar-track { background: transparent; }
  .prompt-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* 貼り付けエリア */
  .paste-label { font-size: 11px; letter-spacing: 0.15em; color: var(--accent2); text-transform: uppercase; margin-top: 16px; margin-bottom: 8px; }

  .paste-area {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 14px;
    min-height: 100px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.8;
    outline: none;
    cursor: text;
    transition: border-color 0.2s;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .paste-area:focus { border-color: var(--accent); border-style: solid; }
  .paste-area:empty::before { content: attr(data-placeholder); color: var(--text-muted); pointer-events: none; }

  /* ヒント */
  .hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.6; }
  .hint a { color: var(--accent2); text-decoration: none; }

  /* 結果 */
  .result-article {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
    font-size: 15px;
    line-height: 2;
    color: #d0e0e8;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .result-actions { display: flex; gap: 10px; margin-top: 14px; }

  .btn-action {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-dim);
    font-size: 12px;
    padding: 7px 18px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-action:hover { border-color: var(--accent); color: var(--accent2); }

  /* エラー */
  .error-msg {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(192,80,80,0.08);
    border: 1px solid rgba(192,80,80,0.3);
    border-radius: 6px;
    color: var(--error);
    font-size: 12px;
    display: none;
  }
  .error-msg.visible { display: block; }

  .hidden { display: none !important; }

  footer { margin-top: 64px; text-align: center; font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; }
</style>
<link rel="apple-touch-icon" href="./icon.png">
</head>
<body>
<div class="wrap">

  <header>
    <svg class="logo-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="24" cy="34" rx="18" ry="8" fill="rgba(42,127,127,0.18)" />
      <circle cx="24" cy="20" r="11" stroke="#2a7f7f" stroke-width="1.5" fill="rgba(42,127,127,0.12)" />
      <circle cx="24" cy="20" r="5" fill="rgba(61,184,184,0.35)" />
      <path d="M12 36 Q24 28 36 36" stroke="#2a7f7f" stroke-width="1" stroke-dasharray="3 3" fill="none" opacity="0.5"/>
      <path d="M8 40 Q24 30 40 40" stroke="#2a7f7f" stroke-width="0.7" stroke-dasharray="2 4" fill="none" opacity="0.3"/>
    </svg>
    <h1>スワンプマン</h1>
    <p class="tagline">Personality Model · Article Generator</p>
  </header>

  <!-- 入力 -->
  <div class="section">
    <div class="section-label">参照記事 URL × 5</div>
    <div class="url-grid" id="urlGrid"></div>
  </div>

  <div class="section">
    <div class="section-label">生成テーマ</div>
    <textarea id="themeInput" placeholder="例：子どもの空手の試合を見ていて気づいたこと"></textarea>
  </div>

  <div class="section">
    <div class="section-label">文字数</div>
    <div class="wordcount-grid">
      <button class="wc-btn" data-wc="500"  onclick="selectWc(this)">500字</button>
      <button class="wc-btn" data-wc="800"  onclick="selectWc(this)">800字</button>
      <button class="wc-btn selected" data-wc="1200" onclick="selectWc(this)">1200字</button>
      <button class="wc-btn" data-wc="1500" onclick="selectWc(this)">1500字</button>
      <button class="wc-btn" data-wc="2000" onclick="selectWc(this)">2000字</button>
    </div>
  </div>

  <div id="errorMain" class="error-msg"></div>

  <button class="btn-main" onclick="generateStep1()">STEP 1 のプロンプトを生成する</button>

  <!-- フロー -->
  <div class="flow" id="flowArea" style="display:none">

    <!-- STEP 1 -->
    <div class="flow-step active" id="flowStep1">
      <div class="flow-step-header">
        <div class="flow-num">1</div>
        <div class="flow-step-title">人格分析プロンプト → Claude に貼る</div>
      </div>
      <div class="flow-content">
        <div class="prompt-box">
          <div class="prompt-topbar">
            <span class="prompt-badge">Prompt · Step 1</span>
            <button class="btn-copy-prompt" onclick="copyPrompt('prompt1Text', this)">コピー</button>
          </div>
          <div class="prompt-text" id="prompt1Text"></div>
        </div>
        <p class="hint">↑ コピーして <a href="https://claude.ai" target="_blank">Claude.ai</a> に貼り、返答をここに貼ってください。</p>

        <div class="paste-label">Claudeの返答を貼る</div>
        <div class="paste-area" id="pastePersona" contenteditable="true"
             data-placeholder="Claudeが出力した人格分析の結果をここに貼り付け…"></div>

        <button class="btn-main" onclick="generateStep2()">STEP 2 のプロンプトを生成する</button>
        <div id="errorStep1" class="error-msg"></div>
      </div>
    </div>

    <!-- STEP 2 -->
    <div class="flow-step hidden" id="flowStep2">
      <div class="flow-step-header">
        <div class="flow-num">2</div>
        <div class="flow-step-title">記事生成プロンプト → Claude に貼る</div>
      </div>
      <div class="flow-content">
        <div class="prompt-box">
          <div class="prompt-topbar">
            <span class="prompt-badge">Prompt · Step 2</span>
            <button class="btn-copy-prompt" onclick="copyPrompt('prompt2Text', this)">コピー</button>
          </div>
          <div class="prompt-text" id="prompt2Text"></div>
        </div>
        <p class="hint">↑ コピーして <a href="https://claude.ai" target="_blank">新しいチャット</a> に貼り、生成された記事を下に貼ってください。</p>

        <div class="paste-label">完成記事を貼る</div>
        <div class="paste-area" id="pasteArticle" contenteditable="true"
             data-placeholder="Claudeが生成した記事をここに貼り付け…"></div>

        <button class="btn-main" onclick="finalizeArticle()">記事を確認する</button>
        <div id="errorStep2" class="error-msg"></div>
      </div>
    </div>

    <!-- STEP 3 結果 -->
    <div class="flow-step hidden" id="flowStep3">
      <div class="flow-step-header">
        <div class="flow-num">✓</div>
        <div class="flow-step-title">完成</div>
      </div>
      <div class="flow-content">
        <div class="result-article" id="resultArticle"></div>
        <div class="result-actions">
          <button class="btn-action" onclick="copyFinal(this)">テキストをコピー</button>
          <button class="btn-action" onclick="resetAll()">最初からやり直す</button>
        </div>
      </div>
    </div>

  </div>

  <footer>swampman — not a copy, a resurrection</footer>
</div>

<script>
// URL フィールド生成
const urlGrid = document.getElementById('urlGrid');
for (let i = 1; i <= 5; i++) {
  urlGrid.innerHTML += `
    <div class="url-row">
      <span class="url-index">${i}</span>
      <div class="url-input-wrap">
        <input type="url" class="url-field" placeholder="https://note.com/..." />
      </div>
    </div>`;
}

// 文字数
let selectedWc = 1200;
function selectWc(btn) {
  document.querySelectorAll('.wc-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedWc = parseInt(btn.dataset.wc);
}

// エラー
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = '⚠ ' + msg;
  el.classList.add('visible');
}
function clearErr(id) { document.getElementById(id).classList.remove('visible'); }

// STEP 1
function generateStep1() {
  clearErr('errorMain');
  const urls = [...document.querySelectorAll('.url-field')].map(e => e.value.trim()).filter(Boolean);
  const theme = document.getElementById('themeInput').value.trim();
  if (urls.length < 3) return showErr('errorMain', 'URLを3本以上入力してください。');
  if (!theme)          return showErr('errorMain', 'テーマを入力してください。');

  const urlList = urls.map((u, i) => `${i + 1}. ${u}`).join('\n');

  const prompt =
`以下の記事群を書いた人物の人格モデルを抽出してください。

【記事URL一覧】
${urlList}

（URLを一つずつ開いて記事本文を読んでください）

【抽出してほしいこと】
記事の文章・表現を直接引用・転用せず、「この人はこういう思考・価値観・感情パターン・ユーモアの傾向を持つ人間だ」という人格レベルで分析してください。

以下の観点でまとめてください：
- 思考スタイル（論理的/直感的/体験談重視 など）
- 感情の出し方・ユーモアのパターン
- 価値観・大切にしていること
- 文章の呼吸感・テンポ感（どこで息を抜くか）
- 読者との距離感・話しかけ方のクセ
- 自己開示の深さ・照れ隠しの仕方

出力は300〜400字程度の人格プロファイルにまとめてください。`;

  document.getElementById('prompt1Text').textContent = prompt;
  document.getElementById('flowArea').style.display = 'block';
  document.getElementById('flowArea').scrollIntoView({ behavior: 'smooth' });
}

// STEP 2
function generateStep2() {
  clearErr('errorStep1');
  const persona = document.getElementById('pastePersona').innerText.trim();
  if (persona.length < 30) return showErr('errorStep1', 'Claudeの返答を貼り付けてください。');

  const theme = document.getElementById('themeInput').value.trim();
  const wc = selectedWc;
  const wcRange = `${Math.round(wc * 0.9)}〜${Math.round(wc * 1.1)}字`;

  const prompt =
`あなたは以下の人格プロファイルを持つ人物として記事を執筆します。

【人格プロファイル】
${persona}

【絶対厳守の制約】
1. 元の記事の表現・フレーズ・構成を一切流用・合成・コピーしないこと
2. 上記の人格から「この人ならこう考え、こう語るはずだ」という予測に基づいて書くこと
3. AIが書いたと感じさせる表現（「〜でしょう」の多用、綺麗すぎるまとめ）を避ける
4. この人物らしい体験談・感情・ユーモアや逡巡を自然に盛り込む

【形式】
- テーマ：${theme}
- 文字数：${wcRange}
- note風・口語体・見出しなし
- 記事のみ出力（前置き・説明・後書き不要）`;

  document.getElementById('prompt2Text').textContent = prompt;
  document.getElementById('flowStep1').classList.add('done');
  document.getElementById('flowStep2').classList.remove('hidden');
  document.getElementById('flowStep2').classList.add('active');
  document.getElementById('flowStep2').scrollIntoView({ behavior: 'smooth' });
}

// STEP 3
function finalizeArticle() {
  clearErr('errorStep2');
  const article = document.getElementById('pasteArticle').innerText.trim();
  if (article.length < 50) return showErr('errorStep2', 'Claudeが生成した記事を貼り付けてください。');

  document.getElementById('resultArticle').textContent = article;
  document.getElementById('flowStep2').classList.add('done');
  document.getElementById('flowStep3').classList.remove('hidden');
  document.getElementById('flowStep3').classList.add('active');
  document.getElementById('flowStep3').scrollIntoView({ behavior: 'smooth' });
}

// コピー
function copyPrompt(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'コピーしました ✓';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  });
}

function copyFinal(btn) {
  navigator.clipboard.writeText(document.getElementById('resultArticle').textContent).then(() => {
    btn.textContent = 'コピーしました ✓';
    setTimeout(() => { btn.textContent = 'テキストをコピー'; }, 2000);
  });
}

// リセット
function resetAll() {
  document.querySelectorAll('.url-field').forEach(e => e.value = '');
  document.getElementById('themeInput').value = '';
  document.getElementById('pastePersona').innerText = '';
  document.getElementById('pasteArticle').innerText = '';
  document.getElementById('flowArea').style.display = 'none';
  document.getElementById('flowStep2').classList.add('hidden');
  document.getElementById('flowStep3').classList.add('hidden');
  ['flowStep1','flowStep2','flowStep3'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
  });
  document.getElementById('flowStep1').classList.add('active');
  ['errorMain','errorStep1','errorStep2'].forEach(clearErr);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  }).then(()=>{
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
</html>
