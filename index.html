<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スワンプマン</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg:        #0d1117;
    --surface:   #131c24;
    --surface2:  #1a2633;
    --border:    #1f3040;
    --accent:    #2a7f7f;
    --accent2:   #3db8b8;
    --text:      #c8d8e0;
    --text-dim:  #6a8899;
    --text-muted:#3a5060;
    --error:     #c05050;
    --success:   #3db88a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    line-height: 1.8;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(42,127,127,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 60% at 80% 80%, rgba(42,127,127,0.04) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .wrap {
    position: relative; z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── ヘッダー ── */
  header { margin-bottom: 48px; text-align: center; }
  .logo-mark { display: inline-block; width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.85; }
  h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(26px, 6vw, 36px);
    font-weight: 700; letter-spacing: 0.12em; color: #e0ecf0; margin-bottom: 10px;
  }
  .tagline { font-size: 12px; letter-spacing: 0.18em; color: var(--text-dim); text-transform: uppercase; }

  /* ── セクション ── */
  .section { margin-bottom: 28px; }
  .section-label {
    font-size: 11px; letter-spacing: 0.2em; color: var(--accent2);
    text-transform: uppercase; margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── フォーム部品 ── */
  input[type="url"], input[type="text"], textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: 'Noto Sans JP', sans-serif; font-weight: 300; font-size: 13px;
    padding: 11px 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; line-height: 1.5;
  }
  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(42,127,127,0.15);
  }
  input::placeholder, textarea::placeholder { color: var(--text-muted); }
  textarea { resize: vertical; min-height: 72px; }

  .url-grid { display: flex; flex-direction: column; gap: 10px; }
  .url-row { display: flex; align-items: center; gap: 10px; }
  .url-index { font-size: 11px; color: var(--text-muted); width: 18px; text-align: right; flex-shrink: 0; }
  .url-input-wrap { flex: 1; }

  /* ── 文字数 ── */
  .wordcount-grid { display: flex; gap: 8px; flex-wrap: wrap; }
  .wc-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-dim); font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; padding: 9px 18px; cursor: pointer; transition: all 0.18s;
  }
  .wc-btn:hover { border-color: var(--accent); color: var(--text); }
  .wc-btn.selected { background: rgba(42,127,127,0.18); border-color: var(--accent2); color: var(--accent2); }

  /* ── ボタン系 ── */
  .btn-main {
    background: var(--accent); color: #e0ecf0; border: none; border-radius: 6px;
    font-family: 'Noto Serif JP', serif; font-size: 14px; font-weight: 700;
    letter-spacing: 0.1em; padding: 14px 36px; cursor: pointer;
    transition: background 0.2s, transform 0.1s; width: 100%; margin-top: 12px;
  }
  .btn-main:hover:not(:disabled) { background: #338f8f; }
  .btn-main:active:not(:disabled) { transform: scale(0.99); }
  .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-sub {
    background: none; border: 1px solid var(--border); border-radius: 5px;
    color: var(--text-dim); font-size: 12px; padding: 7px 16px;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-sub:hover { border-color: var(--accent); color: var(--accent2); }

  .btn-copy-prompt {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); font-size: 11px; padding: 4px 12px;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-copy-prompt:hover { border-color: var(--accent); color: var(--accent2); }

  /* ── 人格バッジ（保持中表示） ── */
  .persona-badge {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px;
    background: rgba(42,127,127,0.07);
    border: 1px solid rgba(61,184,184,0.2);
    border-radius: 8px;
    margin-bottom: 24px;
  }
  .persona-badge-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); flex-shrink: 0; margin-top: 7px;
  }
  .persona-badge-body { flex: 1; min-width: 0; }
  .persona-badge-label {
    font-size: 10px; letter-spacing: 0.18em; color: var(--accent2);
    text-transform: uppercase; margin-bottom: 6px;
  }
  .persona-badge-text {
    font-size: 12.5px; color: var(--text-dim); line-height: 1.7;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .persona-badge-text.expanded { display: block; }
  .persona-badge-actions { display: flex; gap: 8px; margin-top: 10px; }

  /* ── アコーディオン（URL折りたたみ） ── */
  .accordion-header {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
    padding: 10px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; transition: border-color 0.2s;
  }
  .accordion-header:hover { border-color: var(--accent); }
  .accordion-title { font-size: 12px; color: var(--text-dim); letter-spacing: 0.08em; }
  .accordion-arrow {
    font-size: 10px; color: var(--text-muted);
    transition: transform 0.25s;
  }
  .accordion-arrow.open { transform: rotate(180deg); }
  .accordion-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease, padding 0.2s;
    padding: 0 0;
  }
  .accordion-body.open { max-height: 500px; padding: 14px 0 0; }

  /* ── プロンプトボックス ── */
  .prompt-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .prompt-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface2);
  }
  .prompt-badge-label { font-size: 10px; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; }
  .prompt-text {
    padding: 16px; font-size: 12.5px; line-height: 1.85; color: var(--text);
    white-space: pre-wrap; word-break: break-all;
    max-height: 260px; overflow-y: auto;
  }
  .prompt-text::-webkit-scrollbar { width: 4px; }
  .prompt-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── ヒント ── */
  .hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.6; }
  .hint a { color: var(--accent2); text-decoration: none; }

  /* ── 貼り付けラベル（人格保存用） ── */
  .paste-label { font-size: 11px; letter-spacing: 0.15em; color: var(--accent2); text-transform: uppercase; margin-top: 16px; margin-bottom: 8px; }
  .paste-area {
    background: var(--surface); border: 1px dashed var(--border); border-radius: 8px;
    padding: 14px; min-height: 100px; font-size: 13px; color: var(--text); line-height: 1.8;
    outline: none; cursor: text; transition: border-color 0.2s;
    white-space: pre-wrap; word-break: break-all;
  }
  .paste-area:focus { border-color: var(--accent); border-style: solid; }
  .paste-area:empty::before { content: attr(data-placeholder); color: var(--text-muted); pointer-events: none; }

  /* ── エラー ── */
  .error-msg {
    margin-top: 12px; padding: 10px 14px;
    background: rgba(192,80,80,0.08); border: 1px solid rgba(192,80,80,0.3);
    border-radius: 6px; color: var(--error); font-size: 12px; display: none;
  }
  .error-msg.visible { display: block; }

  .hidden { display: none !important; }

  /* ── 区切り線 ── */
  .divider { height: 1px; background: var(--border); margin: 32px 0; }

  footer { margin-top: 64px; text-align: center; font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; }
</style>
<link rel="apple-touch-icon" href="./icon.png">
</head>
<body>
<div class="wrap">

  <header>
    <svg class="logo-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="24" cy="34" rx="18" ry="8" fill="rgba(42,127,127,0.18)"/>
      <circle cx="24" cy="20" r="11" stroke="#2a7f7f" stroke-width="1.5" fill="rgba(42,127,127,0.12)"/>
      <circle cx="24" cy="20" r="5" fill="rgba(61,184,184,0.35)"/>
      <path d="M12 36 Q24 28 36 36" stroke="#2a7f7f" stroke-width="1" stroke-dasharray="3 3" fill="none" opacity="0.5"/>
      <path d="M8 40 Q24 30 40 40" stroke="#2a7f7f" stroke-width="0.7" stroke-dasharray="2 4" fill="none" opacity="0.3"/>
    </svg>
    <h1>スワンプマン</h1>
    <p class="tagline">Personality Model · Article Generator</p>
  </header>

  <!-- ════════════════════════════════
       人格保持中バッジ（保存済み時のみ表示）
  ════════════════════════════════ -->
  <div id="personaBadge" class="persona-badge hidden">
    <div class="persona-badge-dot"></div>
    <div class="persona-badge-body">
      <div class="persona-badge-label">人格モデル 保持中</div>
      <div class="persona-badge-text" id="personaBadgeText"></div>
      <div class="persona-badge-actions">
        <button class="btn-sub" onclick="togglePersonaExpand()">もっと見る</button>
        <button class="btn-sub" onclick="resetPersona()">人格を更新する</button>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════
       人格セットアップ（未保存時のみ表示）
  ════════════════════════════════ -->
  <div id="setupArea">

    <!-- URL入力（アコーディオン） -->
    <div class="section">
      <div class="accordion-header" onclick="toggleAccordion()">
        <span class="accordion-title">参照記事 URL × 5</span>
        <span class="accordion-arrow open" id="accordionArrow">▲</span>
      </div>
      <div class="accordion-body open" id="accordionBody">
        <div class="url-grid" id="urlGrid"></div>
      </div>
    </div>

    <button class="btn-main" onclick="generateStep1()">STEP 1｜人格分析プロンプトを生成</button>
    <div id="errorSetup" class="error-msg"></div>

    <!-- STEP1フロー -->
    <div class="flow" id="setupFlow" style="display:none">
      <div class="flow-step active" id="setupFlowStep1">
        <div class="flow-step-header">
          <div class="flow-num">1</div>
          <div class="flow-step-title">人格分析プロンプト → Claude に貼る</div>
        </div>
        <div class="flow-content">
          <div class="prompt-box">
            <div class="prompt-topbar">
              <span class="prompt-badge-label">Prompt · Step 1</span>
              <button class="btn-copy-prompt" onclick="copyPrompt('prompt1Text', this)">コピー</button>
            </div>
            <div class="prompt-text" id="prompt1Text"></div>
          </div>
          <p class="hint">↑ コピーして <a href="https://claude.ai" target="_blank">Claude.ai</a> に貼り、返答を下に貼ってください。</p>

          <div class="paste-label">Claudeの返答を貼る</div>
          <div class="paste-area" id="pastePersona" contenteditable="true"
               data-placeholder="Claudeが出力した人格分析の結果をここに貼り付け…"></div>

          <button class="btn-main" onclick="savePersona()">この人格を保存して記事生成へ</button>
          <div id="errorPersonaSave" class="error-msg"></div>
        </div>
      </div>
    </div>

  </div><!-- /setupArea -->

  <div class="divider" id="mainDivider" style="display:none"></div>

  <!-- ════════════════════════════════
       記事生成エリア（人格保存後に表示）
  ════════════════════════════════ -->
  <div id="generateArea" style="display:none">

    <div class="section">
      <div class="section-label">生成テーマ</div>
      <textarea id="themeInput" placeholder="例：子どもの空手の試合を見ていて気づいたこと"></textarea>
    </div>

    <div class="section">
      <div class="section-label">文字数</div>
      <div class="wordcount-grid">
        <button class="wc-btn" data-wc="500"  onclick="selectWc(this)">500字</button>
        <button class="wc-btn" data-wc="800"  onclick="selectWc(this)">800字</button>
        <button class="wc-btn selected" data-wc="1200" onclick="selectWc(this)">1200字</button>
        <button class="wc-btn" data-wc="1500" onclick="selectWc(this)">1500字</button>
        <button class="wc-btn" data-wc="2000" onclick="selectWc(this)">2000字</button>
      </div>
    </div>

    <button class="btn-main" onclick="generateStep2()">記事生成プロンプトを生成</button>
    <div id="errorGenerate" class="error-msg"></div>

    <!-- 記事生成プロンプト -->
    <div id="generatePromptBox" style="display:none">
      <div class="prompt-box">
        <div class="prompt-topbar">
          <span class="prompt-badge-label">Prompt · 記事生成</span>
          <button class="btn-copy-prompt" onclick="copyPrompt('prompt2Text', this)">コピー</button>
        </div>
        <div class="prompt-text" id="prompt2Text"></div>
      </div>
      <p class="hint">↑ コピーして <a href="https://claude.ai" target="_blank">Claude.ai</a> に貼るだけでOK。別テーマで書くときはそのまま上のフォームを変えて再生成できます。</p>
    </div>

  </div><!-- /generateArea -->

  <footer>swampman — not a copy, a resurrection</footer>
</div>

<script>
// ══════════════════════════════════════
// 初期化
// ══════════════════════════════════════

// URLフィールド生成
const urlGrid = document.getElementById('urlGrid');
for (let i = 1; i <= 5; i++) {
  urlGrid.innerHTML += `
    <div class="url-row">
      <span class="url-index">${i}</span>
      <div class="url-input-wrap">
        <input type="url" class="url-field" placeholder="https://note.com/..." />
      </div>
    </div>`;
}

// 文字数
let selectedWc = 1200;
function selectWc(btn) {
  document.querySelectorAll('.wc-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedWc = parseInt(btn.dataset.wc);
}

// ── 起動時: localStorageから人格を復元
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('swampman_persona');
  if (saved) {
    showPersonaMode(saved);
  }
});

// ══════════════════════════════════════
// 人格モード切り替え
// ══════════════════════════════════════

function showPersonaMode(personaText) {
  // バッジ表示
  document.getElementById('personaBadgeText').textContent = personaText;
  document.getElementById('personaBadge').classList.remove('hidden');
  // セットアップ非表示 → 生成エリア表示
  document.getElementById('setupArea').classList.add('hidden');
  document.getElementById('mainDivider').style.display = 'block';
  document.getElementById('generateArea').style.display = 'block';
}

function savePersona() {
  clearErr('errorPersonaSave');
  const persona = document.getElementById('pastePersona').innerText.trim();
  if (persona.length < 30) return showErr('errorPersonaSave', 'Claudeの返答を貼り付けてください。');

  localStorage.setItem('swampman_persona', persona);
  showPersonaMode(persona);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetPersona() {
  if (!confirm('人格モデルをリセットして再分析しますか？')) return;
  localStorage.removeItem('swampman_persona');
  // 表示を戻す
  document.getElementById('personaBadge').classList.add('hidden');
  document.getElementById('setupArea').classList.remove('hidden');
  document.getElementById('mainDivider').style.display = 'none';
  document.getElementById('generateArea').style.display = 'none';
  // フローリセット
  document.getElementById('setupFlow').style.display = 'none';
  document.getElementById('pastePersona').innerText = '';
  document.querySelectorAll('.url-field').forEach(e => e.value = '');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 人格テキスト展開/折りたたみ
let personaExpanded = false;
function togglePersonaExpand() {
  personaExpanded = !personaExpanded;
  const el = document.getElementById('personaBadgeText');
  const btn = document.querySelector('.persona-badge-actions .btn-sub');
  el.classList.toggle('expanded', personaExpanded);
  btn.textContent = personaExpanded ? '折りたたむ' : 'もっと見る';
}

// ══════════════════════════════════════
// アコーディオン
// ══════════════════════════════════════
function toggleAccordion() {
  const body = document.getElementById('accordionBody');
  const arrow = document.getElementById('accordionArrow');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

// ══════════════════════════════════════
// STEP 1: 人格分析プロンプト生成
// ══════════════════════════════════════
function generateStep1() {
  clearErr('errorSetup');
  const urls = [...document.querySelectorAll('.url-field')].map(e => e.value.trim()).filter(Boolean);
  if (urls.length < 3) return showErr('errorSetup', 'URLを3本以上入力してください。');

  const urlList = urls.map((u, i) => `${i + 1}. ${u}`).join('\n');

  const prompt =
`以下の記事群を書いた人物の人格モデルを抽出してください。

【記事URL一覧】
${urlList}

（URLを一つずつ開いて記事本文を読んでください）

【抽出してほしいこと】
記事の文章・表現を直接引用・転用せず、「この人はこういう思考・価値観・感情パターン・ユーモアの傾向を持つ人間だ」という人格レベルで分析してください。

以下の観点でまとめてください：
- 思考スタイル（論理的/直感的/体験談重視 など）
- 感情の出し方・ユーモアのパターン
- 価値観・大切にしていること
- 文章の呼吸感・テンポ感（どこで息を抜くか）
- 読者との距離感・話しかけ方のクセ
- 自己開示の深さ・照れ隠しの仕方

出力は300〜400字程度の人格プロファイルにまとめてください。`;

  document.getElementById('prompt1Text').textContent = prompt;
  document.getElementById('setupFlow').style.display = 'block';
  document.getElementById('setupFlow').scrollIntoView({ behavior: 'smooth' });
}

// ══════════════════════════════════════
// STEP 2: 記事生成プロンプト生成
// ══════════════════════════════════════
function generateStep2() {
  clearErr('errorGenerate');
  const theme = document.getElementById('themeInput').value.trim();
  if (!theme) return showErr('errorGenerate', 'テーマを入力してください。');

  const persona = localStorage.getItem('swampman_persona') || '';
  const wc = selectedWc;
  const wcRange = `${Math.round(wc * 0.9)}〜${Math.round(wc * 1.1)}字`;

  const prompt =
`あなたは以下の人格プロファイルを持つ人物として記事を執筆します。

【人格プロファイル】
${persona}

【絶対厳守の制約】
1. 元の記事の表現・フレーズ・構成を一切流用・合成・コピーしないこと
2. 上記の人格から「この人ならこう考え、こう語るはずだ」という予測に基づいて書くこと
3. AIが書いたと感じさせる表現（「〜でしょう」の多用、綺麗すぎるまとめ）を避ける
4. この人物らしい体験談・感情・ユーモアや逡巡を自然に盛り込む

【形式】
- テーマ：${theme}
- 文字数：${wcRange}
- note風・口語体・見出しなし
- 記事のみ出力（前置き・説明・後書き不要）`;

  document.getElementById('prompt2Text').textContent = prompt;
  document.getElementById('generatePromptBox').style.display = 'block';
  document.getElementById('generatePromptBox').scrollIntoView({ behavior: 'smooth' });
}

// ══════════════════════════════════════
// ユーティリティ
// ══════════════════════════════════════
function copyPrompt(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'コピーしました ✓';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  });
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = '⚠ ' + msg;
  el.classList.add('visible');
}
function clearErr(id) { document.getElementById(id).classList.remove('visible'); }
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  }).then(()=>{
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
</html>
